

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Form Field Position Editor with Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfjs-dist/3.11.174/pdf.min.js"></script>
    <style>
        .field-item {
            cursor: move;
            user-select: none;
        }
        .field-item:hover {
            transform: scale(1.02);
        }
        .canvas-area {
            background-image: 
                linear-gradient(rgba(0,0,0,.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .pdf-canvas {
            border: 2px solid #e5e7eb;
            max-width: 100%;
            height: auto;
        }
        .field-overlay {
            position: absolute;
            background: rgba(59, 130, 246, 0.7);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            cursor: move;
            border: 2px solid transparent;
            white-space: nowrap;
        }
        .field-overlay.selected {
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px #fbbf24;
        }
        .field-overlay:hover {
            background: rgba(37, 99, 235, 0.8);
        }
        .preview-mode .field-overlay {
            background: transparent;
            color: #1f2937;
            border: 1px solid #d1d5db;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto p-6">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">PDF Form Field Position Editor</h1>
            <p class="text-gray-600">Upload your PDF and TXT file, position fields, and preview with actual data</p>
        </div>

        <!-- File Upload Section -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Upload Files</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Upload PDF File</label>
                    <input type="file" id="pdfUpload" accept=".pdf" 
                           class="w-full p-3 border-2 border-dashed border-gray-300 rounded-lg hover:border-blue-400 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Upload TXT File (Form Data)</label>
                    <input type="file" id="txtUpload" accept=".txt" 
                           class="w-full p-3 border-2 border-dashed border-gray-300 rounded-lg hover:border-blue-400 focus:border-blue-500 focus:outline-none">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Fields Panel -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-lg p-4">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">Form Fields</h2>
                    <div id="fieldsList" class="space-y-2 max-h-96 overflow-y-auto">
                        <p class="text-gray-500 text-center py-8">Upload TXT file to load fields</p>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t space-y-2">
                        <button id="previewBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors disabled:bg-gray-400" disabled>
                            👁️ Preview with Data
                        </button>
                        <button id="editModeBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors" style="display: none;">
                            ✏️ Edit Mode
                        </button>
                        <button id="downloadBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                            📥 Download Coordinates
                        </button>
                        <button id="resetBtn" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                            🔄 Reset Positions
                        </button>
                    </div>
                </div>
            </div>

            <!-- PDF Canvas Area -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-lg p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">PDF Preview</h2>
                        <div id="modeIndicator" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium">
                            Edit Mode
                        </div>
                    </div>
                    <div id="pdfContainer" class="relative border-2 border-gray-300 rounded-lg bg-gray-50 min-h-96 flex items-center justify-center">
                        <p class="text-gray-500">Upload a PDF file to start positioning fields</p>
                    </div>
                </div>
            </div>

            <!-- Properties Panel -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-lg p-4">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">Field Properties</h2>
                    <div id="propertiesPanel" class="space-y-4">
                        <p class="text-gray-500 text-center py-8">Select a field to edit properties</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let formFields = {};
        let formData = {};
        let selectedField = null;
        let dragOffset = { x: 0, y: 0 };
        let pdfDoc = null;
        let pdfScale = 1;
        let isPreviewMode = false;

        // Initialize the application
        function init() {
            setupEventListeners();
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('pdfUpload').addEventListener('change', handlePDFUpload);
            document.getElementById('txtUpload').addEventListener('change', handleTXTUpload);
            document.getElementById('downloadBtn').addEventListener('click', downloadCoordinates);
            document.getElementById('resetBtn').addEventListener('click', resetPositions);
            document.getElementById('previewBtn').addEventListener('click', togglePreviewMode);
            document.getElementById('editModeBtn').addEventListener('click', toggleEditMode);
        }

        // Handle PDF upload
        async function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                pdfDoc = pdf;
                
                // Render first page
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1 });
                
                // Calculate scale to fit container
                const container = document.getElementById('pdfContainer');
                const maxWidth = container.offsetWidth - 40;
                pdfScale = Math.min(maxWidth / viewport.width, 1);
                
                const scaledViewport = page.getViewport({ scale: pdfScale });
                
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-canvas';
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                
                const context = canvas.getContext('2d');
                await page.render({
                    canvasContext: context,
                    viewport: scaledViewport
                }).promise;
                
                // Clear container and add canvas
                container.innerHTML = '';
                container.appendChild(canvas);
                
                // Create overlay for fields
                const overlay = document.createElement('div');
                overlay.id = 'fieldOverlay';
                overlay.style.position = 'absolute';
                overlay.style.top = '0';
                overlay.style.left = '0';
                overlay.style.width = canvas.width + 'px';
                overlay.style.height = canvas.height + 'px';
                overlay.style.pointerEvents = 'none';
                
                container.style.position = 'relative';
                container.appendChild(overlay);
                
                // Render existing fields if any
                if (Object.keys(formFields).length > 0) {
                    renderFieldsOnPDF();
                }
                
            } catch (error) {
                console.error('Error loading PDF:', error);
                alert('Error loading PDF file. Please try again.');
            }
        }

        // Handle TXT upload
        async function handleTXTUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                parseFormData(text);
                populateFieldsList();
                
                if (pdfDoc) {
                    renderFieldsOnPDF();
                }
                
                document.getElementById('previewBtn').disabled = false;
                
            } catch (error) {
                console.error('Error loading TXT file:', error);
                alert('Error loading TXT file. Please try again.');
            }
        }

        // Parse form data from TXT file
        function parseFormData(text) {
            const lines = text.split('\n');
            formData = {};
            formFields = {};
            
            lines.forEach(line => {
                const trimmedLine = line.trim();
                if (trimmedLine && trimmedLine.includes(':')) {
                    const [key, value] = trimmedLine.split(':').map(s => s.trim());
                    if (key && key !== '===' && !key.includes('===')) {
                        formData[key] = value || '';
                        
                        // Initialize field coordinates if not exists
                        if (!formFields[key]) {
                            formFields[key] = {
                                coords: [{
                                    pos: [100 + (Object.keys(formFields).length % 3) * 150, 100 + Math.floor(Object.keys(formFields).length / 3) * 40],
                                    char_spacing: 18,
                                    font_size: 12
                                }]
                            };
                        }
                    }
                }
            });
        }

        // Populate fields list
        function populateFieldsList() {
            const fieldsList = document.getElementById('fieldsList');
            fieldsList.innerHTML = '';

            Object.keys(formFields).forEach(fieldName => {
                const fieldItem = document.createElement('div');
                fieldItem.className = 'field-item bg-blue-50 hover:bg-blue-100 p-3 rounded-lg border border-blue-200 cursor-pointer transition-all';
                
                const dataValue = formData[fieldName] || 'undefined';
                const displayValue = dataValue.length > 20 ? dataValue.substring(0, 20) + '...' : dataValue;
                
                fieldItem.innerHTML = `
                    <div class="font-medium text-gray-800">${fieldName}</div>
                    <div class="text-xs text-gray-600 mt-1">
                        Value: ${displayValue}
                    </div>
                    <div class="text-xs text-gray-500">
                        Pos: [${formFields[fieldName].coords[0].pos[0]}, ${formFields[fieldName].coords[0].pos[1]}]
                    </div>
                `;
                fieldItem.addEventListener('click', () => selectFieldFromList(fieldName));
                fieldsList.appendChild(fieldItem);
            });
        }

        // Render fields on PDF
        function renderFieldsOnPDF() {
            const overlay = document.getElementById('fieldOverlay');
            if (!overlay) return;
            
            overlay.innerHTML = '';
            overlay.style.pointerEvents = isPreviewMode ? 'none' : 'auto';
            
            Object.keys(formFields).forEach(fieldName => {
                const field = formFields[fieldName];
                const fieldElement = document.createElement('div');
                fieldElement.className = `field-overlay ${isPreviewMode ? 'preview-mode' : ''}`;
                fieldElement.dataset.fieldName = fieldName;
                
                // Convert PDF coordinates to canvas coordinates
                const x = field.coords[0].pos[0] * pdfScale;
                const y = field.coords[0].pos[1] * pdfScale;
                
                fieldElement.style.left = x + 'px';
                fieldElement.style.top = y + 'px';
                fieldElement.style.fontSize = (field.coords[0].font_size * pdfScale) + 'px';
                
                // Show field name in edit mode, actual data in preview mode
                if (isPreviewMode) {
                    const dataValue = formData[fieldName] || 'undefined';
                    fieldElement.textContent = dataValue;
                    fieldElement.style.letterSpacing = (field.coords[0].char_spacing * pdfScale) + 'px';
                } else {
                    fieldElement.textContent = fieldName;
                    fieldElement.style.pointerEvents = 'auto';
                    fieldElement.addEventListener('mousedown', startDrag);
                    fieldElement.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectField(fieldName);
                    });
                }
                
                overlay.appendChild(fieldElement);
            });
        }

        // Start dragging
        function startDrag(e) {
            if (isPreviewMode) return;
            
            e.preventDefault();
            const fieldElement = e.target;
            const fieldName = fieldElement.dataset.fieldName;
            
            selectField(fieldName);
            
            const rect = fieldElement.getBoundingClientRect();
            const overlayRect = document.getElementById('fieldOverlay').getBoundingClientRect();
            
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;

            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
        }

        // Drag function
        function drag(e) {
            if (!selectedField || isPreviewMode) return;

            const overlay = document.getElementById('fieldOverlay');
            const overlayRect = overlay.getBoundingClientRect();
            
            let newX = e.clientX - overlayRect.left - dragOffset.x;
            let newY = e.clientY - overlayRect.top - dragOffset.y;

            // Constrain to overlay bounds
            newX = Math.max(0, Math.min(newX, overlay.offsetWidth - 100));
            newY = Math.max(0, Math.min(newY, overlay.offsetHeight - 30));

            const fieldElement = document.querySelector(`[data-field-name="${selectedField}"]`);
            fieldElement.style.left = newX + 'px';
            fieldElement.style.top = newY + 'px';

            // Update coordinates (convert back to PDF coordinates)
            const pdfX = Math.round(newX / pdfScale);
            const pdfY = Math.round(newY / pdfScale);
            
            formFields[selectedField].coords[0].pos = [pdfX, pdfY];
            updatePropertiesPanel();
            populateFieldsList();
        }

        // Stop dragging
        function stopDrag() {
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // Select field
        function selectField(fieldName) {
            if (isPreviewMode) return;
            
            selectedField = fieldName;
            
            // Highlight selected field
            document.querySelectorAll('[data-field-name]').forEach(el => {
                el.classList.remove('selected');
            });
            
            const fieldElement = document.querySelector(`[data-field-name="${fieldName}"]`);
            if (fieldElement) {
                fieldElement.classList.add('selected');
            }

            updatePropertiesPanel();
        }

        // Select field from list
        function selectFieldFromList(fieldName) {
            selectField(fieldName);
        }

        // Update properties panel
        function updatePropertiesPanel() {
            const panel = document.getElementById('propertiesPanel');
            
            if (!selectedField || isPreviewMode) {
                panel.innerHTML = '<p class="text-gray-500 text-center py-8">Select a field to edit properties</p>';
                return;
            }

            const field = formFields[selectedField];
            const dataValue = formData[selectedField] || 'undefined';
            
            panel.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Field Name</label>
                        <div class="bg-gray-100 p-2 rounded text-sm">${selectedField}</div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Data Value</label>
                        <div class="bg-blue-50 p-2 rounded text-sm max-h-20 overflow-y-auto">${dataValue}</div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">X Position</label>
                        <input type="number" id="posX" value="${field.coords[0].pos[0]}" 
                               class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Y Position</label>
                        <input type="number" id="posY" value="${field.coords[0].pos[1]}" 
                               class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Character Spacing</label>
                        <input type="number" id="charSpacing" value="${field.coords[0].char_spacing}" 
                               class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Font Size</label>
                        <input type="number" id="fontSize" value="${field.coords[0].font_size}" 
                               class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    
                    <button onclick="updateFieldProperties()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                        Update Field
                    </button>
                </div>
            `;
        }

        // Update field properties
        function updateFieldProperties() {
            if (!selectedField || isPreviewMode) return;

            const posX = parseInt(document.getElementById('posX').value);
            const posY = parseInt(document.getElementById('posY').value);
            const charSpacing = parseInt(document.getElementById('charSpacing').value);
            const fontSize = parseInt(document.getElementById('fontSize').value);

            formFields[selectedField].coords[0].pos = [posX, posY];
            formFields[selectedField].coords[0].char_spacing = charSpacing;
            formFields[selectedField].coords[0].font_size = fontSize;

            renderFieldsOnPDF();
            populateFieldsList();
        }

        // Toggle preview mode
        function togglePreviewMode() {
            isPreviewMode = true;
            document.getElementById('previewBtn').style.display = 'none';
            document.getElementById('editModeBtn').style.display = 'block';
            document.getElementById('modeIndicator').textContent = 'Preview Mode';
            document.getElementById('modeIndicator').className = 'px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-sm font-medium';
            
            selectedField = null;
            renderFieldsOnPDF();
            updatePropertiesPanel();
        }

        // Toggle edit mode
        function toggleEditMode() {
            isPreviewMode = false;
            document.getElementById('previewBtn').style.display = 'block';
            document.getElementById('editModeBtn').style.display = 'none';
            document.getElementById('modeIndicator').textContent = 'Edit Mode';
            document.getElementById('modeIndicator').className = 'px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium';
            
            renderFieldsOnPDF();
            updatePropertiesPanel();
        }

        // Download coordinates
        function downloadCoordinates() {
            const dataStr = JSON.stringify(formFields, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = 'form_field_coordinates.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Reset positions
        function resetPositions() {
            if (confirm('Are you sure you want to reset all field positions?')) {
                Object.keys(formFields).forEach((fieldName, index) => {
                    const row = Math.floor(index / 3);
                    const col = index % 3;
                    formFields[fieldName].coords[0].pos = [100 + col * 150, 100 + row * 40];
                    formFields[fieldName].coords[0].char_spacing = 18;
                    formFields[fieldName].coords[0].font_size = 12;
                });
                
                renderFieldsOnPDF();
                populateFieldsList();
                updatePropertiesPanel();
            }
        }

        // Initialize the application
        init();
    </script>
