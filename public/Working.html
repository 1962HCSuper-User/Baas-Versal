// data pase to by dynamic data file
function parseDataFile(content) {
  const formBlocks = content.split(/-{5,}/g); // split by ------
  return formBlocks.map(block => {
    const lines = block.split('\n').filter(line => line.includes(':'));
    const data = {};
    lines.forEach(line => {
      const [key, ...rest] = line.split(':');
      data[key.trim()] = rest.join(':').trim();
    });
    return data;
  });
}





 // for geting list of pdf name 

 window.addEventListener("DOMContentLoaded", async () => {
  const select = document.getElementById("pdfSelect");
  try {
    const response = await fetch("/api/pdf-list");
    const pdfs = await response.json();
    pdfs.forEach(pdf => {
      const option = document.createElement("option");
      option.value = pdf;
      option.textContent = pdf;
      select.appendChild(option);
    });
  } catch (err) {
    alert("Failed to load PDF list");
    console.error(err);
  }
});





  async function loadImageBytes(file) {
  const reader = new FileReader();
  return new Promise((resolve, reject) => {
    reader.onload = () => resolve(new Uint8Array(reader.result));
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function fillPdf() {
const selectedPdf = document.getElementById('pdfSelect').value;
if (!selectedPdf) return alert("Please select a PDF from the list");

const pdfUrl = `Pdf/${encodeURIComponent(selectedPdf)}`;
const pdfBytes = await fetch(pdfUrl).then(res => res.arrayBuffer());
const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
const pages = pdfDoc.getPages();

const photoFile = document.getElementById('photoInput').files[0];
  const signatureFile = document.getElementById('signatureInput').files[0];

  if (!pdfFile || !photoFile || !signatureFile) {
    alert("Please upload all required files (PDF, Photo, Signature)");
    return;
  }

  try {
    const pdfBytes = await pdfFile.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    const pages = pdfDoc.getPages();

    // Load image bytes
    const [photoBytes, signatureBytes] = await Promise.all([
      loadImageBytes(photoFile),
      loadImageBytes(signatureFile)
    ]);

    // Embed photo as JPG or PNG
    let photoImg;
    try {
      photoImg = await pdfDoc.embedJpg(photoBytes);
    } catch (e) {
      try {
        photoImg = await pdfDoc.embedPng(photoBytes);
      } catch (err) {
        throw new Error("Photo must be a valid JPG or PNG image.");
      }
    }

    // Embed signature as JPG or PNG
    let signatureImg;
    try {
      signatureImg = await pdfDoc.embedPng(signatureBytes);
    } catch (e) {
      try {
        signatureImg = await pdfDoc.embedJpg(signatureBytes);
      } catch (err) {
        throw new Error("Signature must be a valid PNG or JPG image.");
      }
    }

    // Fill text fields
    // Fill text fields
// Define fields that require one character per box (digit-by-digit spacing)
const charSpacedFields = [
  "Account no",
  "Membership no",
  "Full_Name",
  "Account opening date",
  "Date of birth",
  "AGE",
  "Father/Husband name",
  "Receipt no",
  "Certificate no",
  "House no",
  "Street/Village",
  "Post",
  "District",
  "State",
  "Pincode",
  "Mobile no",
  "Nominee name",
  "Nominee relation",
  "Nominee age",
  "Proportion",
  "Pan card",
  "Amount",
  "Denomination"
];

// Fill text fields
for (let pageIndex in coordinates) {
  const page = pages[pageIndex];
  for (let key in coordinates[pageIndex]) {
    const coordInfo = coordinates[pageIndex][key];
    const fieldKey = field_mapping[key];
    const text = sampleData[fieldKey] || "";

    coordInfo.coords.forEach(pos => {
      const isSpaced = charSpacedFields.includes(key);

      if (isSpaced) {
  let x = pos.pos[0];
  for (let char of text) {
    page.drawText(char, {
      x: x,
      y: pos.pos[1],
      size: pos.font_size,
      color: PDFLib.rgb(0, 0, 0)
    });
    x += pos.char_spacing; // Move x by char_spacing
  }
} else {
  page.drawText(text, {
    x: pos.pos[0],
    y: pos.pos[1],
    size: pos.font_size,
    color: PDFLib.rgb(0, 0, 0)
  });
}

    });
  }
}

    // Place photo
    const photoPos = photo_signature.photo[0];
    pages[0].drawImage(photoImg, {
      x: photoPos.x,
      y: photoPos.y,
      width: photoPos.width,
      height: photoPos.height
    });

    // Place signatures
    for (let pageIndex in photo_signature.signature) {
      photo_signature.signature[pageIndex].forEach(sig => {
        pages[pageIndex].drawImage(signatureImg, {
          x: sig.x,
          y: sig.y,
          width: sig.width,
          height: sig.height
        });
      });
    }

    // Place stamps
    for (let pageIndex in photo_signature.stamps) {
      for (let stamp of photo_signature.stamps[pageIndex]) {
        const url = `Stamps/${stamp.file}`;
        const stampBytes = await fetch(url).then(res => res.arrayBuffer());
        const stampImg = await pdfDoc.embedPng(stampBytes);
        pages[pageIndex].drawImage(stampImg, {
          x: stamp.x,
          y: stamp.y,
          width: stamp.width,
          height: stamp.height
        });
      }
    }

    // Download final PDF
    const finalPdfBytes = await pdfDoc.save();
    const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'filled_form.pdf';
    link.click();

  } catch (err) {
    console.error("Error filling PDF:", err);
    alert(`Something went wrong:\n${err.message}`);
  }
}
