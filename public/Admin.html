<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Tools Home</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 50px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
      animation: slideDown 1.5s ease forwards;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    a {
      text-decoration: none;
      font-size: 1.5rem;
      padding: 15px 30px;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff512f, #dd2476);
      color: #fff;
      font-weight: bold;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    a::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.3);
      transform: skewX(-45deg);
      transition: left 0.5s ease;
    }

    a:hover::before {
      left: 200%;
    }

    a:hover {
      transform: scale(1.1);
      box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
    }

    /* Floating animation */
    .links a {
      animation: float 3s ease-in-out infinite;
    }

    .links a:nth-child(2) {
      animation-delay: 1s;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ PDF Tools Home ✨</h1>
    <div class="links">
      <a href="test2.html">📌 Coordinates Preview</a>
       <a href="/"> Home page </a>
      <a href="test.html">🔤 Character Spacing & PDF Preview</a>
    </div>
  </div>
</body>
</html>
