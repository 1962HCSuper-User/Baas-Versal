<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
        }

        #pdfCanvas {
            border: 1px solid #ccc;
            display: block;
            margin: auto;
        }

        .marker {
            position: absolute;
            border: 1px solid #000;
            padding: 2px 5px;
            font-size: 10px;
            color: #fff;
            cursor: move;
            user-select: none;
        }

        .marker.red {
            background: rgba(255, 0, 0, 0.6);
        }

        .marker.blue {
            background: rgba(0, 0, 255, 0.6);
        }

        .marker.green {
            background: rgba(0, 255, 0, 0.6);
        }

        .marker.purple {
            background: rgba(128, 0, 128, 0.6);
        }

        #editorContainer {
            position: relative;
            display: inline-block;
        }

        #controls {
            margin: 10px 0;
        }

        textarea {
            width: 100%;
            height: 200px;
        }
    </style>
</head>

<body>
    <h2>PDF Coordinate Editor (Preview Mode)</h2>

    <div id="controls">
        <label>Select PDF:</label>
        <select id="pdfSelect"></select>
        <button id="loadPdf">Load PDF</button>
        <button id="exportJson">Download Updated Coordinates</button>
    </div>

    <div id="previewControls">
        <label>Upload TXT:</label><input type="file" id="txtUpload" accept=".txt">
        <label>Upload Photo:</label><input type="file" id="photoUpload" accept="image/*">
        <label>Upload Signature:</label><input type="file" id="sigUpload" accept="image/*">
        <button id="previewBtn">Preview Filled PDF</button>
    </div>

    <div id="editorContainer">
        <canvas id="pdfCanvas"></canvas>
    </div>
    <div id="pageControls">
        <button id="prevPage">Previous</button>
        <span>Page: <span id="pageNum">1</span> / <span id="pageCount">0</span></span>
        <button id="nextPage">Next</button>
    </div>
<div id="adjustControls" style="margin:10px 0; display:none;">
    <h3>Adjust Settings</h3>
    <label>Font Size: <input type="number" id="fontSizeInput" step="0.5"></label>
    <label>Char Spacing: <input type="number" id="charSpacingInput" step="0.5"></label>
    <label>Width: <input type="number" id="widthInput" step="1"></label>
    <label>Height: <input type="number" id="heightInput" step="1"></label>
    <button id="applyAdjust">Apply</button>
</div>

    <h3>Live JSON Preview:</h3>
    <textarea id="jsonOutput" readonly></textarea>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/upng@1.0.1/build/upng.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script>
        let pdfDoc = null;
        let pageNum = 1;
        let scale = 1.2;
        let coordinates = {};
        let field_mapping = {};
        let charSpacedFields = [];
        let photo_signature = {};
        let currentBaseName = "";

        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('editorContainer');

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport }).promise;
            drawMarkers(num - 1);

            // update UI
            document.getElementById("pageNum").textContent = num;
        }

        document.getElementById("prevPage").addEventListener("click", () => {
            if (pageNum <= 1) return;
            pageNum--;
            renderPage(pageNum);
        });

        document.getElementById("nextPage").addEventListener("click", () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            renderPage(pageNum);
        });

        document.getElementById("loadPdf").addEventListener("click", async () => {
            const pdfName = document.getElementById("pdfSelect").value;
            if (!pdfName) return alert("Select a PDF first");

            currentBaseName = pdfName.replace(/\.pdf$/i, "");

            const pdfUrl = `Pdf/${encodeURIComponent(pdfName)}`;
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            pdfDoc = await loadingTask.promise;

            // update page count
            document.getElementById("pageCount").textContent = pdfDoc.numPages;

            await loadCoordinatesForPDF(currentBaseName);
            pageNum = 1;
            await renderPage(pageNum);
        });

        function drawMarkers(pageIndex) {
            document.querySelectorAll('.marker').forEach(m => m.remove());

            // Fields (only if coordinates exist for this page)
            if (coordinates[pageIndex]) {
                for (let field in coordinates[pageIndex]) {
                    coordinates[pageIndex][field].coords.forEach((coord, i) => {
                        // coords stored in PDF user space units (original PDF size)
                        const x = coord.pos[0] * scale;
                        const y = coord.pos[1] * scale;
                        addMarker(field, x, y, pageIndex, i, 40, 15, "red");
                    });
                }
            }

            // Photo
            if (photo_signature.photo?.[pageIndex]) {
                const p = photo_signature.photo[pageIndex];
                addMarker("photo", p.x * scale, p.y * scale, pageIndex, 0, p.width * scale, p.height * scale, "blue");
            }

            // Signature
            if (photo_signature.signature?.[pageIndex]) {
                photo_signature.signature[pageIndex].forEach((s, i) =>
                    addMarker("signature", s.x * scale, s.y * scale, pageIndex, i, s.width * scale, s.height * scale, "green")
                );
            }

            // Stamps
            if (photo_signature.stamps?.[pageIndex]) {
                photo_signature.stamps[pageIndex].forEach((s, i) =>
                    addMarker(`stamp: ${s.file}`, s.x * scale, s.y * scale, pageIndex, i, s.width * scale, s.height * scale, "purple", "stamp")
                );
            }

            updateJson();
        }

        let selectedMarkerData = null;

function addMarker(label, x, y, pageIndex, index, w = 40, h = 15, color = "red", type = label) {
    const marker = document.createElement('div');
    marker.className = `marker ${color}`;
    marker.style.left = `${x}px`;
    marker.style.bottom = `${y}px`;
    marker.style.width = w + "px";
    marker.style.height = h + "px";
    marker.textContent = label;

    // === Marker Selection for Adjustments ===
    marker.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedMarkerData = { label, pageIndex, index, type };
        showAdjustControls(selectedMarkerData);
    });

    // === Drag move (your existing code) ===
    marker.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const data = { label, pageIndex, index, type };
        const startX = e.clientX;
        const startY = e.clientY;
        const origLeft = parseFloat(marker.style.left);
        const origBottom = parseFloat(marker.style.bottom);

        const onMove = (e) => {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            marker.style.left = `${origLeft + dx}px`;
            marker.style.bottom = `${origBottom - dy}px`;
        };

        const onUp = (e) => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);

            // Update coords
            const newLeft = parseFloat(marker.style.left);
            const newBottom = parseFloat(marker.style.bottom);
            const xPdf = newLeft / scale;
            const yPdf = newBottom / scale;

            if (data.type === "photo") {
                Object.assign(photo_signature.photo[data.pageIndex], { x: xPdf, y: yPdf });
            } else if (data.type === "signature") {
                Object.assign(photo_signature.signature[data.pageIndex][data.index], { x: xPdf, y: yPdf });
            } else if (data.type === "stamp") {
                Object.assign(photo_signature.stamps[data.pageIndex][data.index], { x: xPdf, y: yPdf });
            } else {
                coordinates[data.pageIndex][data.label].coords[data.index].pos = [xPdf, yPdf];
            }

            updateJson();
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });

    container.appendChild(marker);
}



function showAdjustControls(data) {
    const panel = document.getElementById("adjustControls");
    panel.style.display = "block";

    let fontSize = "", charSpacing = "", width = "", height = "";

    if (data.type === "photo") {
        const p = photo_signature.photo[data.pageIndex];
        width = p.width;
        height = p.height;
    } else if (data.type === "signature") {
        const s = photo_signature.signature[data.pageIndex][data.index];
        width = s.width;
        height = s.height;
    } else if (data.type === "stamp") {
        const s = photo_signature.stamps[data.pageIndex][data.index];
        width = s.width;
        height = s.height;
    } else {
        const coord = coordinates[data.pageIndex][data.label].coords[data.index];
        fontSize = coord.font_size || 10;
        charSpacing = coord.char_spacing || 0;
    }

    document.getElementById("fontSizeInput").value = fontSize;
    document.getElementById("charSpacingInput").value = charSpacing;
    document.getElementById("widthInput").value = width;
    document.getElementById("heightInput").value = height;
}

document.getElementById("applyAdjust").addEventListener("click", () => {
    if (!selectedMarkerData) return;

    const fontSize = parseFloat(document.getElementById("fontSizeInput").value);
    const charSpacing = parseFloat(document.getElementById("charSpacingInput").value);
    const width = parseFloat(document.getElementById("widthInput").value);
    const height = parseFloat(document.getElementById("heightInput").value);

    if (selectedMarkerData.type === "photo") {
        Object.assign(photo_signature.photo[selectedMarkerData.pageIndex], { width, height });
    } else if (selectedMarkerData.type === "signature") {
        Object.assign(photo_signature.signature[selectedMarkerData.pageIndex][selectedMarkerData.index], { width, height });
    } else if (selectedMarkerData.type === "stamp") {
        Object.assign(photo_signature.stamps[selectedMarkerData.pageIndex][selectedMarkerData.index], { width, height });
    } else {
        const coord = coordinates[selectedMarkerData.pageIndex][selectedMarkerData.label].coords[selectedMarkerData.index];
        if (!isNaN(fontSize)) coord.font_size = fontSize;
        if (!isNaN(charSpacing)) coord.char_spacing = charSpacing;
    }

    updateJson();
});




        function updateJson() {
            document.getElementById("jsonOutput").value =
                `window.dynamicCoordinates = ${JSON.stringify({
                    coordinates, field_mapping, charSpacedFields, photo_signature
                }, null, 2)};`;
        }

        // Load PDF lists
        window.addEventListener("DOMContentLoaded", async () => {
            const select = document.getElementById("pdfSelect");
            try {
                const response = await fetch("/api/pdf-list");
                const pdfs = await response.json();
                pdfs.forEach(pdf => {
                    const option = document.createElement("option");
                    option.value = pdf;
                    option.textContent = pdf;
                    select.appendChild(option);
                });
            } catch (err) {
                alert("Failed to load PDF list");
                console.error(err);
            }
        });

        async function loadCoordinatesForPDF(baseName) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = `Coordinates/${baseName}.js?cacheBust=${Date.now()}`;
                script.onload = () => {
                    if (window.dynamicCoordinates) {
                        coordinates = window.dynamicCoordinates.coordinates;
                        field_mapping = window.dynamicCoordinates.field_mapping;
                        charSpacedFields = window.dynamicCoordinates.charSpacedFields;
                        photo_signature = window.dynamicCoordinates.photo_signature;
                        window.dynamicCoordinates = null;
                        updateJson();
                        resolve();
                    } else reject(new Error("No coordinates found"));
                };
                script.onerror = () => reject(new Error("Failed to load coordinates"));
                document.body.appendChild(script);
            });
        }

        document.getElementById("exportJson").addEventListener("click", () => {
            if (!currentBaseName) {
                alert("Load a PDF first");
                return;
            }
            const json = document.getElementById("jsonOutput").value;
            const blob = new Blob([json], { type: "application/javascript" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${currentBaseName}.js`;
            link.click();
        });

        // Preview functionality
        document.getElementById("previewBtn").addEventListener("click", async () => {
            if (!pdfDoc || !currentBaseName) return alert('Load PDF first');
            const txtFile = document.getElementById('txtUpload').files[0];
            if (!txtFile) return alert('Upload TXT file');
            const photoFile = document.getElementById('photoUpload').files[0];
            const sigFile = document.getElementById('sigUpload').files[0];

            const data = await parseTxt(txtFile);

            const pdfUrl = `Pdf/${encodeURIComponent(currentBaseName + '.pdf')}`;
            const pdfBytes = await fetch(pdfUrl).then(res => res.arrayBuffer());

            const pdf = await PDFLib.PDFDocument.load(new Uint8Array(pdfBytes));
            const helvetica = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
            const rgb = PDFLib.rgb;

            const pages = pdf.getPages();
            for (let pi = 0; pi < pages.length; pi++) {
                const page = pages[pi];
                const pageIndex = pi;

                // Add text fields
                if (coordinates[pageIndex]) {
                    for (const field in coordinates[pageIndex]) {
                        const f = coordinates[pageIndex][field];
                        const key = field_mapping[field] || field;
                        const value = data[key] || '';
                        if (charSpacedFields.includes(field)) {
                            const chars = value.split('');
                            f.coords.forEach((coord, ci) => {
                                if (ci < chars.length) {
                                    page.drawText(chars[ci], {
                                        x: coord.pos[0],
                                        y: coord.pos[1],
                                        size: 10,
                                        font: helvetica,
                                        color: rgb(0, 0, 0)
                                    });
                                }
                            });
                        } else {
                            if (f.coords.length > 0) {
                                const coord = f.coords[0];
                                page.drawText(value, {
                                    x: coord.pos[0],
                                    y: coord.pos[1],
                                    size: 10,
                                    font: helvetica,
                                    color: rgb(0, 0, 0)
                                });
                            }
                        }
                    }
                }

                // Add photo
                if (photo_signature.photo?.[pageIndex] && photoFile) {
                    const p = photo_signature.photo[pageIndex];
                    const photoAB = await photoFile.arrayBuffer();
                    let img;
                    if (photoFile.type.includes('jpeg')) {
                        img = await pdf.embedJpg(photoAB);
                    } else if (photoFile.type.includes('png')) {
                        img = await pdf.embedPng(photoAB);
                    } else {
                        alert('Photo must be JPG or PNG');
                        return;
                    }
                    page.drawImage(img, { x: p.x, y: p.y, width: p.width, height: p.height });
                }

                // Add signatures (same image for all positions)
                if (photo_signature.signature?.[pageIndex] && sigFile) {
                    const sigAB = await sigFile.arrayBuffer();
                    let img;
                    if (sigFile.type.includes('jpeg')) {
                        img = await pdf.embedJpg(sigAB);
                    } else if (sigFile.type.includes('png')) {
                        img = await pdf.embedPng(sigAB);
                    } else {
                        alert('Signature must be JPG or PNG');
                        return;
                    }
                    photo_signature.signature[pageIndex].forEach(s => {
                        page.drawImage(img, { x: s.x, y: s.y, width: s.width, height: s.height });
                    });
                }

                // Add stamps from Stamps folder
                if (photo_signature.stamps?.[pageIndex]) {
                    for (const s of photo_signature.stamps[pageIndex]) {
                        const stampUrl = `Stamps/${s.file}`;
                        const stampResponse = await fetch(stampUrl);
                        if (!stampResponse.ok) {
                            console.error(`Failed to load stamp: ${s.file}`);
                            continue;
                        }
                        const stampAB = await stampResponse.arrayBuffer();
                        let img;
                        if (s.file.toLowerCase().endsWith('.jpg') || s.file.toLowerCase().endsWith('.jpeg')) {
                            img = await pdf.embedJpg(stampAB);
                        } else if (s.file.toLowerCase().endsWith('.png')) {
                            img = await pdf.embedPng(stampAB);
                        } else {
                            console.error(`Unsupported stamp format: ${s.file}`);
                            continue;
                        }
                        page.drawImage(img, { x: s.x, y: s.y, width: s.width, height: s.height });
                    }
                }
            }

            const modifiedBytes = await pdf.save();
            const blob = new Blob([modifiedBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        });

        async function parseTxt(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const text = e.target.result;
                    const lines = text.split('\n');
                    const data = {};
                    lines.forEach(line => {
                        if (line.includes(':')) {
                            let [key, val] = line.split(':').map(s => s.trim());
                            data[key] = val;
                        }
                    });
                    resolve(data);
                };
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }
    </script>
</body>

</html>
